name: Build Windows

on:
  # Runs automatically whenever a new release is published (triggered by the Mac build)
  release:
    types: [published]
  # Also allows manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v1.1.1). Leave blank to use the latest release.'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: npm run build && npx electron-builder --win --x64 --publish always
