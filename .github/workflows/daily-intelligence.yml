name: Daily Intelligence Fetch

# Fetches new drone-related articles from NewsAPI, categorizes each with Claude,
# and stores them in Supabase (cs_articles + cs_fetch_log + cs_fetch_status).
on:
  schedule:
    - cron: '0 6 * * *' # every day at 06:00 UTC
  workflow_dispatch: {} # allow manual run from the Actions tab

permissions:
  contents: write # needed to commit JSON backups / outputs back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run fetch script
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/fetch-intelligence.js

      - name: Commit any updated files back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily intelligence fetch $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
