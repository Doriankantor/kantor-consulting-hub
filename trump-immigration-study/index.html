/* ============================ helpers / atoms ============================ */ / atoms ============================ */
const fmt = (n) => n == null ? "—" : n.toLocaleString("en-US");
const fmtB = (n) => n == null ? "—" : "$" + (n/1e9).toFixed(1) + "B";
const fmtT = (n) => n == null ? "—" : "$" + (n/1e12).toFixed(1) + "T";

const COL = {
  t1: "#38bdf8", t2: "#f472b6", biden: "#94a3b8",
  title8: "#22c55e", title42: "#f59e0b",
  strong: "#22c55e", moderate: "#f59e0b", weak: "#ef4444",
  ceiling: "#64748b", actual: "#38bdf8",
};

function Pill({ children, color = "#334155", text = "#e2e8f0" }) {
  return <span className="inline-block px-2 py-0.5 rounded-full text-[11px] font-medium"
    style={{ background: color + "22", color: text, border: "1px solid " + color + "55" }}>{children}</span>;
}

function Trend({ t }) {
  const up = /ris|surg|grew|climb|increas|expand|up\b|higher|record/i.test(t || "");
  const down = /fell|declin|drop|collaps|reduc|lowest|down|decreas/i.test(t || "");
  const c = up ? "#f87171" : down ? "#4ade80" : "#cbd5e1";
  const arrow = up ? "▲" : down ? "▼" : "■";
  return <span style={{ color: c }} className="text-[11px] font-mono">{arrow} {t}</span>;
}

function AttrBadge({ level }) {
  const key = (level || "").toLowerCase();
  const c = key.includes("strong") ? COL.strong : key.includes("weak") ? COL.weak : COL.moderate;
  const label = key.includes("strong") ? "Strong" : key.includes("weak") ? "Weak" : "Moderate";
  return (
    <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-semibold"
      style={{ background: c + "22", color: c, border: "1px solid " + c + "66" }}>
      <span style={{ width: 7, height: 7, borderRadius: 99, background: c, display: "inline-block" }} />
      Attribution: {label}
    </span>
  );
}

function Src({ s }) {
  if (!s) return null;
  const txt = [s.agency, s.edition, s.dataAsOf && ("as of " + s.dataAsOf)].filter(Boolean).join(" · ");
  return (
    <div className="text-[11px] text-slate-500 mt-2 flex items-start gap-1">
      <span className="text-slate-600">▸ Source:</span>
      {s.url
        ? <a href={s.url} target="_blank" rel="noopener" className="text-sky-500 hover:text-sky-300 underline decoration-dotted break-all">{txt}</a>
        : <span>{txt}</span>}
    </div>
  );
}

/* expandable: surface always visible, detail behind click */
function Expand({ title, children, badge }) {
  return (
    <details className="group">
      <summary className="flex items-center gap-2 text-[12px] text-sky-400 hover:text-sky-300 select-none py-1">
        <span className="transition-transform group-open:rotate-90 inline-block">▸</span>
        {title}
        {badge}
      </summary>
      <div className="reveal pl-4 mt-1 border-l border-slate-700">{children}</div>
    </details>
  );
}

function Card({ children, className = "" }) {
  return <div className={"rounded-xl border border-slate-800 bg-slate-900/60 p-4 " + className}>{children}</div>;
}

function SectionTitle({ kicker, title, sub }) {
  return (
    <div className="mb-4">
      <div className="text-[11px] uppercase tracking-[0.2em] text-slate-500">{kicker}</div>
      <h2 className="text-xl sm:text-2xl font-bold text-slate-100 mt-0.5">{title}</h2>
      {sub && <p className="text-sm text-slate-400 mt-1 max-w-3xl">{sub}</p>}
    </div>

}

function ChartFrame({ title, note, children, h = 280 }) {
  return (
    <div>
      {title && <div className="text-sm font-semibold text-slate-200 mb-1">{title}</div>}
      <div style={{ width: "100%", height: h }}>{children}</div>
      {note && <div className="text-[11px] text-slate-500 mt-2 leading-snug">{note}</div>}

}

const tipStyle = { background: "#0f172a", border: "1px solid #334155", borderRadius: 8, fontSize: 12, color: "#e2e8f0" };

/* ============================ litigation / events rows ============================ */

}
function LitRow({ l }) {

    <div className="py-1.5">

/* ============================ A. POLICY RECORD ============================ */
function PolicyBlock({ pa }) {
  if (!pa) return null;
  return (
    <Card>
      <div className="flex flex-wrap items-start justify-between gap-2">
        <div className="flex-1 min-w-[60%]">
          <div className="text-[15px] font-semibold text-slate-100">{pa.headline}</div>
          <p className="text-[12.5px] text-slate-400 mt-1">{pa.summary}</p>
        </div>
        {pa.trend && <Trend t={pa.trend} />}
      </div>

      {(pa.fullyRestricted || pa.partiallyRestricted) && (
        <div className="mt-3 grid sm:grid-cols-2 gap-2">
          {pa.fullyRestricted && (
            <div className="rounded-lg bg-rose-500/5 border border-rose-500/20 p-2">
              <div className="text-[11px] font-semibold text-rose-300 mb-1">Fully restricted ({pa.fullyRestricted.length})</div>
              <div className="text-[11px] text-slate-300 leading-relaxed">{pa.fullyRestricted.join(" · ")}</div>
            </div>
          )}
          {pa.partiallyRestricted && (
            <div className="rounded-lg bg-amber-500/5 border border-amber-500/20 p-2">
              <div className="text-[11px] font-semibold text-amber-300 mb-1">Partially restricted ({pa.partiallyRestricted.length})</div>
              <div className="text-[11px] text-slate-300 leading-relaxed">{pa.partiallyRestricted.join(" · ")}</div>
              {pa.partialNote && <div className="text-[10.5px] text-slate-500 mt-1">{pa.partialNote}</div>}
            </div>

        </div>
      )}

      <div className="mt-3 space-y-1">
        {pa.events && (
          <Expand title="Legal mechanism / EO &amp; proclamation detail">
            {pa.events.map((e, i) => <EventRow key={i} e={e} />)}
          </Expand>
        )}
        {pa.litigation && (
          <Expand title="Court challenges &amp; outcomes">
            {pa.litigation.map((l, i) => <LitRow key={i} l={l} />)}
          </Expand>
        )}
        {pa.miles && (
          <Expand title="Mileage &amp; funding detail">
            <div className="text-[12px] text-slate-300 space-y-1 py-1">
              {pa.miles.note && <p>{pa.miles.note}</p>}
              {pa.funding && <p className="text-slate-400">{pa.funding.mechanism}{pa.funding.contracts ? " " + pa.funding.contracts : ""}</p>}
            </div>
          </Expand>
        )}
        {pa.note && <p className="text-[11px] text-slate-500 mt-1">Note: {pa.note}</p>}
      </div>
      <Src s={pa.source} />
    </Card>
  );
}

  return (
    <Card className="lg:col-span-2">

        <ResponsiveContainer>
          <ComposedChart data={annual} margin={{ top: 8, right: 8, left: 4, bottom: 0 }}>
            <CartesianGrid stroke="#1e293b" vertical={false} />
            {/* term shading */}
            <ReferenceArea x1="FY2017" x2="FY2020" fill={COL.t1} fillOpacity={view==="term2"?0.03:0.08} />
            <ReferenceArea x1="FY2021" x2="FY2024" fill={COL.biden} fillOpacity={0.04} />
            <ReferenceArea x1="FY2025" x2="FY2025" fill={COL.t2} fillOpacity={view==="term1"?0.03:0.12} />
            <XAxis dataKey="fy" tick={{ fill: "#94a3b8", fontSize: 11 }} />

            <Legend wrapperStyle={{ fontSize: 11 }} />
            <Bar isAnimationActive={false} dataKey="Title 8 (apprehensions/inadmissibles)" stackId="a" fill={COL.title8} />
            <Bar isAnimationActive={false} dataKey="Title 42 (expulsions)" stackId="a" fill={COL.title42} radius={[3,3,0,0]} />
          </ComposedChart>
        </ResponsiveContainer>
      </div>
      <div className="text-[11px] text-slate-500 mt-1">{bc.dataIntegrity.encountersVsApprehensions} Shaded: <span style={{color:COL.t1}}>Term 1</span> · <span style={{color:COL.biden}}>Biden</span> · <span style={{color:COL.t2}}>Term 2</span>.</div>

      {/* push/pull annotations */}
      <div className="mt-4">
        <div className="text-[12px] font-semibold text-slate-300 mb-1">D · Push &amp; pull factors — why the line moved <span className="text-slate-500 font-normal">(click an event)</span></div>
        <div className="flex flex-wrap gap-1.5">
          {factors.map((f, i) => {
            const dir = f.direction;
            const c = dir.includes("PUSH") ? "#f87171" : dir.includes("PULL") ? "#38bdf8" : dir.includes("SUPPRESS") ? "#4ade80" : "#cbd5e1";

              <button key={i} onClick={() => setActive(active === i ? null : i)}
                className="px-2 py-1 rounded text-[11px] font-medium transition"
                style={{ background: (active===i?c+"33":c+"14"), color: c, border: "1px solid " + c + "55" }}>
                {(f.date || f.dateRange || "").split(";")[0]} · {f.name}
              </button>
            );
          })}
        </div>
        {active != null && (
          <div className="reveal mt-2 rounded-lg border border-slate-700 bg-slate-950/60 p-3">
            <div className="flex items-center gap-2 flex-wrap">
              <Pill color="#475569">{factors[active].direction.replace(/_/g," ")}</Pill>

            <Src s={factors[active].source} />
          </div>

      {view !== "term1" && (
        <div className="mt-5">

                <Tooltip contentStyle={tipStyle} formatter={v => fmt(v)} />
                <Legend wrapperStyle={{ fontSize: 11 }} />
                <ReferenceLine x="25-01" stroke={COL.t2} strokeDasharray="3 3" label={{ value: "Term 2 begins", fill: COL.t2, fontSize: 10, position: "top" }} />
                <Line isAnimationActive={false} type="monotone" dataKey="SW encounters" stroke={COL.title42} strokeWidth={2} dot={{ r: 2 }} />
                <Line isAnimationActive={false} type="monotone" dataKey="USBP apprehensions" stroke={COL.title8} strokeWidth={2} dot={{ r: 2 }} />
              </LineChart>
            </ResponsiveContainer>
          </ChartFrame>
        </div>
      )}
      <Src s={bc.source} />
    </Card>
  );
}

  const d = [
    { y: "2024", "Arrivals (M)": 86, "Travel exports ($B)": t.term2.travelExportsBEA.y2024/1e9 },
    { y: "2025", "Arrivals (M)": 68.3, "Travel exports ($B)": t.term2.travelExportsBEA.y2025/1e9 },
  ];
  return (
    <ChartFrame title="Arrivals (headcount) vs travel exports (dollars)" h={200}
      note="The honest read: arrivals fell 5.5% but BEA travel EXPORTS were ~flat (-0.3% nominal). The widely-cited +$12.9B is travel IMPORTS (US residents abroad) — not a tourism counter-signal.">
      <ResponsiveContainer>
        <ComposedChart data={d} margin={{ top: 8, right: 8, left: -8, bottom: 0 }}>
          <CartesianGrid stroke="#1e293b" vertical={false} />
          <XAxis dataKey="y" tick={{ fill: "#94a3b8", fontSize: 11 }} />
          <YAxis tick={{ fill: "#94a3b8", fontSize: 11 }} />
          <Tooltip contentStyle={tipStyle} />
          <Legend wrapperStyle={{ fontSize: 11 }} />
          <Bar isAnimationActive={false} dataKey="Travel exports ($B)" fill="#22c55e" radius={[3,3,0,0]} />
          <Line isAnimationActive={false} dataKey="Arrivals (M)" stroke="#f472b6" strokeWidth={2.5} dot={{ r: 3 }} />
        </ComposedChart>
      </ResponsiveContainer>
    </ChartFrame>
  );
}

function EconomicImpact() {
  const e = DATA.economicImpact;
  const lab = e.laborSectors, tour = e.tourism, fdi = e.fdi, fm = e.fiscalModeling;
  return (
    <section className="mb-12">
      <SectionTitle kicker="C · Inferential layer — handle with care" title="Economic impact"
        sub="No single 'damage' number. Each measure carries a visible attribution-strength rating; the explanation and confounders are behind the click. Evidence is allowed to point in either direction." />
      <div className="grid lg:grid-cols-2 gap-3">
        <EconCard title="Labor-supply-sensitive sectors" attr={lab.attributionStrength} attrNote={lab.attributionNote} confounders={lab.confounders} source={lab.foreignBornShare.source}>
          <div className="grid grid-cols-2 gap-2 mb-2">
            <Stat label="Foreign-born share, US labor force (2024)" value={(lab.foreignBornShare.overallLaborForce2024*100).toFixed(1)+"%"} />
            <Stat label="Unauthorized share, crop farmworkers" value={(lab.foreignBornShare.agricultureCropworkers.unauthorized*100)+"%"} />
          </div>
          <ul className="text-[12px] text-slate-400 space-y-1">
            {lab.term2Movements.map((m, i) => <li key={i}><b className="text-slate-300">{m.sector}:</b> {m.metric}</li>)}
          </ul>
          <div className="mt-2 rounded-lg bg-sky-500/5 border border-sky-500/20 p-2 text-[11.5px] text-sky-200/90">
            <b>Verifiable channel:</b> Net migration 2025 = {lab.netMigration2025.value} — first net-negative year in 50+ yrs (Census). The DHS "1.6M self-deported" claim is unverified; only ~{fmt(lab.selfDeportClaim.verified)} confirmed via CBP Home app.
          </div>
        </EconCard>

        <EconCard title="Tourism / travel exports" attr={tour.attributionStrength} attrNote={tour.attributionNote} confounders={tour.confounders} source={tour.term2.source}>
          <div className="grid grid-cols-3 gap-2 mb-1">
            <Stat label="Arrivals 2025" value={fmt(tour.term2.arrivals2025)} sub={(tour.term2.arrivals2025YoY*100).toFixed(1)+"% YoY"} />
            <Stat label="Travel exports 2025" value={fmtB(tour.term2.travelExportsBEA.y2025)} sub={(tour.term2.travelExportsBEA.changePct*100).toFixed(1)+"% nom."} />
            <Stat label="Canada arrivals" value={(tour.term2.bySource.canada*100).toFixed(1)+"%"} sub="largest driver" />
          </div>
          <TourismChart t={tour} />
        </EconCard>

        <EconCard title="Inward FDI" attr={fdi.attributionStrength} attrNote={fdi.attributionNote} confounders={fdi.confounders} source={fdi.source}>
          <div className="grid grid-cols-2 gap-2">
            <Stat label="New FDI 2024" value={fmtB(fdi.newFDI2024)} sub={(fdi.newFDI2024YoY*100).toFixed(1)+"% vs 2023"} />
            <Stat label="FDI stock end-2024" value={fmtT(fdi.stockEnd2024)} sub={"+"+(fdi.stockGrowth2024*100).toFixed(1)+"%"} />
          </div>
          <p className="text-[12px] text-slate-400 mt-2">{fdi.fy2025}</p>
          <p className="text-[11px] text-amber-300/80 mt-1">Deliberately rated Weak — the 2024 decline predates Term 2 and is driven by rates/M&amp;A/tariffs, not immigration.</p>
        </EconCard>

        <EconCard title="Fiscal / output modeling" attr={fm.attributionStrength} confounders={fm.confounders}>
          <div className="space-y-2">
            {fm.models.map((m, i) => (
              <div key={i} className="rounded-lg border border-slate-800 bg-slate-950/40 p-2">
                <div className="flex items-center justify-between gap-2 flex-wrap">
                  <span className="text-[12.5px] font-semibold text-slate-200">{m.name}</span>
                  <span className="font-mono text-[10px] text-slate-500">{m.date} · {m.kind}</span>
                </div>
                <Expand title="Findings">
                  {typeof m.findings === "string"
                    ? <p className="text-[12px] text-slate-400 py-1">{m.findings}</p>
                    : <ul className="text-[12px] text-slate-400 py-1 space-y-0.5">
                        {Object.entries(m.findings).map(([k, v]) => <li key={k}><b className="text-slate-300">{k}:</b> {v}</li>)}
                      </ul>}
                  {m.note && <p className="text-[11px] text-slate-500">{m.note}</p>}
                  {m.url && <a href={m.url} target="_blank" rel="noopener" className="text-[11px] text-sky-500 underline decoration-dotted">{m.source || m.url}</a>}
                </Expand>
              </div>
            ))}
          </div>
        </EconCard>
      </div>

      {/* proposed tracking */}
      <div className="mt-4 rounded-xl border border-dashed border-emerald-700/50 bg-emerald-500/5 p-4">
        <div className="flex items-center gap-2">
          <Pill color={COL.strong} text={COL.strong}>Proposed — not established findings</Pill>
          <span className="text-sm font-semibold text-slate-200">How to track the impact going forward</span>
        </div>
        <ul className="mt-2 grid sm:grid-cols-2 gap-x-6 gap-y-1 text-[12px] text-slate-300 list-disc pl-5">
          {e.proposedTrackingMeasures.indicators.map((x, i) => <li key={i}>{x}</li>)}
        </ul>
      </div>
    </section>
  );
}

function Stat({ label, value, sub }) {
  return (
    <div className="rounded-lg bg-slate-950/40 border border-slate-800 p-2">
      <div className="text-[10.5px] text-slate-500 leading-tight">{label}</div>
      <div className="text-base font-bold text-slate-100 mt-0.5">{value}</div>
      {sub && <div className="text-[10.5px] text-slate-500">{sub}</div>}
    </div>
  );
}

/* ============================ shell ============================ */
function Toggle({ view, setView }) {
  const opts = [["term1","Term 1","2017–2021"],["term2","Term 2","2025–present"],["compare","Compare","aligned"]];
  return (
    <div className="inline-flex rounded-xl bg-slate-900 border border-slate-800 p-1 gap-1">
      {opts.map(([k, label, sub]) => (
        <button key={k} onClick={() => setView(k)}
          className={"px-3 sm:px-4 py-1.5 rounded-lg text-sm font-semibold transition " +
            (view === k ? "text-slate-900" : "text-slate-300 hover:text-white")}
          style={view === k ? { background: k==="term1"?COL.t1:k==="term2"?COL.t2:"#e2e8f0" } : {}}>
          {label}<span className="hidden sm:inline text-[10px] font-normal opacity-70"> · {sub}</span>
        </button>
      ))}
    </div>
  );
}

function App() {
  const [view, setView] = useState("compare");
  const m = DATA.meta;
  return (
    <div className="min-h-screen text-slate-200" style={{ background: "radial-gradient(1200px 600px at 70% -10%, #15233f, #0b1120)" }}>
      <div className="max-w-6xl mx-auto px-4 sm:px-6 py-8">
        <header className="mb-6">
          <div className="text-[11px] uppercase tracking-[0.25em] text-sky-400">Interactive study · compiled {m.compiledAsOf}</div>
          <h1 className="text-2xl sm:text-4xl font-extrabold text-white mt-1 leading-tight">Trump Immigration Policy &amp; Economic Impact</h1>
          <p className="text-sm text-slate-400 mt-2 max-w-3xl">{m.purpose}</p>
          <div className="mt-4 flex flex-wrap items-center gap-3">
            <Toggle view={view} setView={setView} />
            {view === "compare" && (
              <span className="text-[11px] text-amber-300/90 bg-amber-500/10 border border-amber-500/25 rounded-lg px-2 py-1">
                ⚠ Comparison method: Term 1 = 4 full years; Term 2 ≈ {m.terms.term2.monthsElapsedApprox} months. Never compare raw totals — annualize or align to same-month-of-term.
              </span>
            )}
          </div>
        </header>

        <div className="rounded-xl border border-slate-800 bg-slate-900/40 p-3 mb-8 text-[12px] text-slate-400 flex flex-wrap gap-x-4 gap-y-1">
          <span><b className="text-slate-300">How to read:</b> headline facts are always visible.</span>
          <span>▸ Click any expander for legal mechanism, litigation, caveats &amp; sources.</span>
          <span><b className="text-slate-300">COVID</b> (2020) is treated as an explicit confounder, not a footnote.</span>
        </div>

        <PolicyRecord view={view} />
        <NumbersBand view={view} />
        <EconomicImpact view={view} />

        <footer className="mt-10 border-t border-slate-800 pt-5 text-[11px] text-slate-500 space-y-2">
          <div><b className="text-slate-400">Open data gaps</b> (marked, not guessed):</div>
          <ul className="list-disc pl-5 space-y-0.5">{m && DATA.openGaps.map((g, i) => <li key={i}>{g}</li>)}</ul>
          <p className="pt-2">{m.verificationStatus} · Every figure renders from a single structured data object. Where evidence is weak or contested it is labeled on the surface. This page documents and tests; it does not assert a predetermined conclusion.</p>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
