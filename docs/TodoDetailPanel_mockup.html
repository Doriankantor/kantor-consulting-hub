<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>To-Do Detail Panel — Kantor Consulting Hub (mockup)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#eef0f4;font-family:-apple-system,"Segoe UI",system-ui,sans-serif;}
  #root{padding:22px;display:flex;justify-content:center;}
  .shell{width:100%;max-width:1240px;}
  .app *{box-sizing:border-box;}
  .app{--indigo:#5b5fc7;--indigo-050:#eef0fb;--ink:#1f1e2e;--muted:#6b6a78;--line:#e7e6ee;
    color:var(--ink);height:812px;display:flex;background:#fff;border-radius:14px;overflow:hidden;
    border:1px solid var(--line);box-shadow:0 24px 70px rgba(40,40,90,.16);}

  /* nav rail */
  .nav{width:60px;background:#f6f6fa;border-right:1px solid var(--line);display:flex;flex-direction:column;
    align-items:center;padding:14px 0;gap:4px;flex:none;}
  .nav-logo{width:34px;height:34px;border-radius:9px;margin-bottom:10px;
    background:linear-gradient(135deg,#6165c9,#8e63c9);color:#fff;font-weight:700;display:grid;place-items:center;font-size:13px;}
  .nav-i{width:40px;height:40px;border-radius:9px;display:grid;place-items:center;color:#7b7a88;cursor:pointer;position:relative;}
  .nav-i:hover{background:#ececf4;}
  .nav-i.on{background:var(--indigo-050);color:var(--indigo);}
  .nav-sp{flex:1;}

  /* list column */
  .todo{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;}
  .todo-head{padding:20px 24px 0;}
  .head-row{display:flex;align-items:center;justify-content:space-between;}
  .head-title{font-size:24px;font-weight:700;display:flex;align-items:center;gap:10px;}
  .count-badge{font-size:12px;font-weight:600;background:var(--indigo-050);color:var(--indigo);border-radius:20px;padding:2px 9px;}
  .head-actions{display:flex;align-items:center;gap:10px;}
  .btn-add{border:0;background:var(--indigo);color:#fff;font-size:13px;font-weight:600;padding:8px 14px;border-radius:9px;
    cursor:pointer;display:flex;align-items:center;gap:6px;}
  .tabs{display:flex;gap:2px;margin-top:16px;border-bottom:1px solid var(--line);}
  .tab{border:0;background:transparent;font-size:14px;font-weight:600;color:var(--muted);padding:10px 4px;
    margin-right:20px;cursor:pointer;position:relative;}
  .tab.on{color:var(--indigo);}
  .tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2.5px;background:var(--indigo);border-radius:2px;}
  .body{flex:1;overflow-y:auto;padding:14px 24px 24px;}
  .grp-h{font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin:14px 2px 8px;}

  /* cards — note the leading color bar */
  .card{position:relative;background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;
    padding:12px 15px 12px 18px;cursor:pointer;transition:.12s;overflow:hidden;}
  .card:hover{border-color:#d5d4e4;}
  .card.sel{border-color:var(--indigo);box-shadow:0 0 0 1px var(--indigo);}
  .card-bar{position:absolute;left:0;top:0;bottom:0;width:5px;}
  .card-top{display:flex;align-items:center;gap:12px;}
  .tick{width:20px;height:20px;border-radius:50%;border:1.7px solid #b7b6cc;flex:none;display:grid;place-items:center;cursor:pointer;transition:.12s;}
  .tick:hover{border-color:var(--indigo);}
  .tick.on{background:var(--indigo);border-color:var(--indigo);}
  .card-title{flex:1;font-size:14.5px;}
  .card-title.done{text-decoration:line-through;color:var(--muted);}
  .star{color:#c3c2d0;cursor:pointer;flex:none;} .star.on{color:#f2b705;}
  .chip{font-size:10.5px;font-weight:700;border-radius:5px;padding:2px 7px;white-space:nowrap;}
  .chip.today{background:#fef2e0;color:#b5650a;}
  .chip.tomorrow{background:#fff4e0;color:#a5680a;}
  .chip.d3{background:#f1f1f6;color:#6b6a78;}
  .mini-meta{display:flex;align-items:center;gap:9px;margin:8px 0 0 32px;font-size:11.5px;color:var(--muted);}
  .mini-meta .mm{display:flex;align-items:center;gap:4px;}
  .rail-mini{margin:9px 0 2px 32px;display:flex;align-items:center;gap:8px;}
  .rail-mini .rc{font-size:11px;color:var(--muted);}
  .rail-mini .rt{flex:1;height:2px;background:#e6e5f1;border-radius:2px;position:relative;max-width:220px;}
  .rail-mini .rf{position:absolute;left:0;top:0;height:100%;background:var(--indigo);border-radius:2px;}
  .card.is-done{opacity:.6;background:#fbfbfd;}

  /* ===== DETAIL PANEL ===== */
  .panel{width:378px;flex:none;border-left:1px solid var(--line);background:#fbfbfd;display:flex;flex-direction:column;}
  .panel-head{padding:16px 18px 12px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px;}
  .panel-head .ph-tick{width:22px;height:22px;border-radius:50%;border:1.8px solid #b7b6cc;flex:none;display:grid;place-items:center;cursor:pointer;margin-top:2px;}
  .panel-head .ph-tick.on{background:var(--indigo);border-color:var(--indigo);}
  .ph-title{flex:1;font-size:16.5px;font-weight:600;line-height:1.3;border:0;background:transparent;resize:none;outline:0;font-family:inherit;color:var(--ink);padding:2px 0;}
  .ph-x{color:#b6b5c4;cursor:pointer;flex:none;}
  .ph-star{cursor:pointer;flex:none;color:#c3c2d0;} .ph-star.on{color:#f2b705;}
  .panel-body{flex:1;overflow-y:auto;padding:6px 18px 18px;}

  .prop{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #eeedf4;}
  .prop-ic{width:20px;color:var(--muted);flex:none;display:grid;place-items:center;}
  .prop-lbl{font-size:13px;color:var(--muted);width:74px;flex:none;}
  .prop-val{flex:1;font-size:13.5px;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .prop-val.empty{color:#a9a8b6;}
  .pill-btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 10px;font-size:12.5px;cursor:pointer;color:var(--ink);display:inline-flex;align-items:center;gap:6px;}
  .pill-btn:hover{border-color:#cfcee0;}
  .pill-btn.on{background:var(--indigo-050);border-color:#cdcdf0;color:var(--indigo);font-weight:600;}

  /* color picker */
  .swatches{display:flex;gap:7px;flex-wrap:wrap;}
  .sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.12s;}
  .sw:hover{transform:scale(1.12);}
  .sw.on{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset;}

  /* recurrence chips */
  .rec-row{display:flex;gap:6px;flex-wrap:wrap;}

  /* steps in panel */
  .sec{margin-top:16px;}
  .sec-h{font-size:11.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
  .sec-h .cnt{color:var(--indigo);}
  .pstep{display:flex;align-items:flex-start;gap:9px;padding:6px 0;}
  .pstep .pd{width:16px;height:16px;border-radius:50%;border:2px solid #cbcadd;flex:none;display:grid;place-items:center;cursor:pointer;margin-top:1px;background:#fff;}
  .pstep .pd.on{background:var(--indigo);border-color:var(--indigo);}
  .pstep .pt{flex:1;font-size:13px;line-height:1.35;}
  .pstep .pt.on{color:var(--indigo);}
  .pstep .pdel{color:#c9c8d4;cursor:pointer;flex:none;opacity:0;}
  .pstep:hover .pdel{opacity:1;}
  .add-step{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .add-step input{flex:1;border:1px solid var(--line);border-radius:7px;padding:7px 10px;font-size:13px;font-family:inherit;outline:0;}
  .add-step input:focus{border-color:var(--indigo);}

  /* horizontal rail inside the panel (the shipped 3b rail, full width) */
  .prail{position:relative;margin:4px 2px 30px;}
  .prail-count{position:absolute;right:2px;top:-4px;font-size:11px;color:var(--muted);}
  .prail-track{position:relative;height:2px;background:#e6e5f1;border-radius:2px;margin:18px 12px 0;}
  .prail-fill{position:absolute;left:0;top:0;height:100%;background:var(--indigo);border-radius:2px;transition:width .45s cubic-bezier(.4,0,.2,1);}
  .prail-dots{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);display:flex;justify-content:space-between;}
  .pdw{position:relative;display:flex;flex-direction:column;align-items:center;}
  .pdot{width:15px;height:15px;border-radius:50%;background:#fff;border:2px solid #cbcadd;display:grid;place-items:center;cursor:pointer;transition:.18s;z-index:2;position:relative;}
  .pdot:hover{border-color:var(--indigo);transform:scale(1.12);}
  .pdot.on{background:var(--indigo);border-color:var(--indigo);}
  .pdlbl{position:absolute;top:19px;font-size:10px;line-height:1.25;text-align:center;width:78px;color:var(--muted);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .pdlbl.on{color:var(--indigo);font-weight:600;}
  .list-h{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#a9a8b6;margin:2px 0 6px;}
  .grip{color:#c4c3d0;cursor:grab;flex:none;display:grid;place-items:center;opacity:0;transition:.12s;}
  .pstep:hover .grip{opacity:1;}
  .grip:active{cursor:grabbing;}
  .pstep.drag{opacity:.5;}
  .pstep.over{border-top:2px solid var(--indigo);}

  /* notes */
  .notes{width:100%;min-height:76px;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:13px;
    font-family:inherit;line-height:1.5;resize:vertical;outline:0;color:var(--ink);background:#fff;}
  .notes:focus{border-color:var(--indigo);}

  /* files */
  .file{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;margin-bottom:6px;font-size:12.5px;}
  .file .fx{margin-left:auto;color:#c1c0ce;cursor:pointer;}
  .file-add{border:1px dashed #cfcee0;border-radius:8px;padding:9px;text-align:center;font-size:12.5px;color:var(--muted);cursor:pointer;}
  .file-add:hover{border-color:var(--indigo);color:var(--indigo);}

  /* recurrence popover feel */
  .hint{font-size:11px;color:#a9a8b6;margin-top:5px;}

  /* revive banner for completed items */
  .revive{background:#fff7 e6;}
  .revive-banner{display:flex;align-items:center;gap:9px;background:#fff8e6;border:1px solid #f4e2b0;color:#8a6d1a;
    border-radius:9px;padding:9px 12px;font-size:12.5px;margin-bottom:12px;}
  .revive-banner button{margin-left:auto;border:0;background:#f2b705;color:#3d2f00;font-weight:600;font-size:12px;
    padding:5px 11px;border-radius:7px;cursor:pointer;}

  .legend{max-width:1240px;margin:14px auto 0;font-size:12.5px;color:#6b6a78;line-height:1.6;}
  .legend b{color:#1f1e2e;}
  .legend .tag{display:inline-block;background:#eef0fb;color:#5b5fc7;font-weight:600;border-radius:5px;padding:1px 7px;margin-right:4px;font-size:11.5px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

/* ---- tiny icon set (lucide-style) ---- */
const P = {
  x:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
  check:<polyline points="20 6 9 17 4 12"/>,
  star:<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
  cal:<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
  repeat:<><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></>,
  palette:<><circle cx="13.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="10.5" r="1.5"/><circle cx="8.5" cy="7.5" r="1.5"/><circle cx="6.5" cy="12.5" r="1.5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></>,
  file:<><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></>,
  paperclip:<path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>,
  note:<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
  trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
  plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
  clock:<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
  grip:<><circle cx="9" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="15" cy="18" r="1.4"/></>,
};
function Ic({n,s=16,c="currentColor",sw=2,fill="none",style}){
  return <svg width={s} height={s} viewBox="0 0 24 24" fill={fill} stroke={c} strokeWidth={sw}
    strokeLinecap="round" strokeLinejoin="round" style={style}>{P[n]}</svg>;
}

const COLORS = ["#5b5fc7","#e5484d","#eaa000","#2f9e44","#0a7ea4","#9c36b5","#6b6a78"];

const seed = [
  {id:1, title:"Book flights to Bogotá", color:"#0a7ea4", star:true, due:"2026-07-24", recur:"none",
   steps:[{t:"Compare fares",d:true},{t:"Confirm dates with Johan",d:false},{t:"Book",d:false}],
   notes:"Prefer LATAM direct. Budget cap €780.", files:["itinerary_draft.pdf"], done:false},
  {id:2, title:"Renew residence permit (Essen)", color:"#e5484d", star:false, due:"2026-07-29", recur:"none",
   steps:[{t:"Book Ausländerbehörde slot",d:false},{t:"Gather documents",d:false},{t:"Passport photos",d:false},{t:"Submit",d:false}],
   notes:"", files:[], done:false},
  {id:3, title:"Weekly team digest", color:"#2f9e44", star:false, due:"2026-07-25", recur:"weekly",
   steps:[], notes:"", files:[], done:false},
  {id:4, title:"Send Q2 invoices", color:"#eaa000", star:false, due:"2026-07-08", recur:"none",
   steps:[{t:"Preply",d:true},{t:"El Espectador",d:true},{t:"Javeriana",d:true}], notes:"All sent.", files:[], done:true},
];

const RECUR = [["none","None"],["daily","Daily"],["weekly","Weekly"],["monthly","Monthly"]];

function App(){
  const [items,setItems]=useState(seed);
  const [selId,setSelId]=useState(1);
  const [draft,setDraft]=useState("");
  const [dragIdx,setDragIdx]=useState(null);
  const [overIdx,setOverIdx]=useState(null);
  const sel = items.find(i=>i.id===selId);
  const patch=(id,fn)=>setItems(xs=>xs.map(i=>i.id===id?fn(i):i));

  const doneCount = sel? sel.steps.filter(s=>s.d).length : 0;

  return (
  <div className="shell">
    <div className="app">
      {/* nav */}
      <div className="nav">
        <div className="nav-logo">KC</div>
        <div className="nav-i"><Ic n="clock" c="#7b7a88"/></div>
        <div className="nav-i on"><Ic n="check" c="#5b5fc7"/></div>
        <div className="nav-i"><Ic n="cal" c="#7b7a88"/></div>
        <div className="nav-sp"/>
      </div>

      {/* list */}
      <div className="todo">
        <div className="todo-head">
          <div className="head-row">
            <div className="head-title">To-Do <span className="count-badge">4</span></div>
            <div className="head-actions">
              <button className="btn-add"><Ic n="plus" s={15} c="#fff"/> Add</button>
            </div>
          </div>
          <div className="tabs">
            <button className="tab on">Personal</button>
            <button className="tab">KC tasks</button>
            <button className="tab">Assigned</button>
            <button className="tab">All</button>
          </div>
        </div>
        <div className="body">
          <div className="grp-h">Starred</div>
          {items.filter(i=>i.star&&!i.done).map(i=>(
            <Card key={i.id} i={i} sel={i.id===selId} onOpen={()=>setSelId(i.id)}
              onTick={()=>patch(i.id,x=>({...x,done:!x.done}))}/>
          ))}
          <div className="grp-h">This week</div>
          {items.filter(i=>!i.star&&!i.done).map(i=>(
            <Card key={i.id} i={i} sel={i.id===selId} onOpen={()=>setSelId(i.id)}
              onTick={()=>patch(i.id,x=>({...x,done:!x.done}))}/>
          ))}
          <div className="grp-h">Completed</div>
          {items.filter(i=>i.done).map(i=>(
            <Card key={i.id} i={i} sel={i.id===selId} onOpen={()=>setSelId(i.id)}
              onTick={()=>patch(i.id,x=>({...x,done:!x.done}))}/>
          ))}
        </div>
      </div>

      {/* DETAIL PANEL */}
      {sel && (
      <div className="panel">
        <div className="panel-head">
          <div className={"ph-tick"+(sel.done?" on":"")} onClick={()=>patch(sel.id,x=>({...x,done:!x.done}))}>
            {sel.done && <Ic n="check" s={13} c="#fff" sw={3}/>}
          </div>
          <textarea className="ph-title" defaultValue={sel.title} rows={2}/>
          <div className={"ph-star"+(sel.star?" on":"")} onClick={()=>patch(sel.id,x=>({...x,star:!x.star}))}>
            <Ic n="star" s={19} c={sel.star?"#f2b705":"#c3c2d0"} fill={sel.star?"#f2b705":"none"}/>
          </div>
          <div className="ph-x"><Ic n="x" s={18}/></div>
        </div>

        <div className="panel-body">
          {sel.done && (
            <div className="revive-banner">
              <Ic n="check" s={15} c="#8a6d1a"/>
              Completed. Want it back?
              <button onClick={()=>patch(sel.id,x=>({...x,done:false}))}>Revive</button>
            </div>
          )}

          {/* COLOR */}
          <div className="prop">
            <div className="prop-ic"><Ic n="palette" s={17}/></div>
            <div className="prop-lbl">Color</div>
            <div className="prop-val">
              <div className="swatches">
                {COLORS.map(c=>(
                  <div key={c} className={"sw"+(sel.color===c?" on":"")} style={{background:c}}
                    onClick={()=>patch(sel.id,x=>({...x,color:c}))}/>
                ))}
              </div>
            </div>
          </div>

          {/* DUE DATE */}
          <div className="prop">
            <div className="prop-ic"><Ic n="cal" s={16}/></div>
            <div className="prop-lbl">Due date</div>
            <div className="prop-val">
              <input type="date" defaultValue={sel.due} className="pill-btn" style={{padding:"5px 9px"}}/>
              <span className="pill-btn"><Ic n="clock" s={13}/> Add time</span>
            </div>
          </div>

          {/* RECURRING */}
          <div className="prop" style={{alignItems:"flex-start"}}>
            <div className="prop-ic" style={{marginTop:5}}><Ic n="repeat" s={16}/></div>
            <div className="prop-lbl" style={{marginTop:6}}>Repeat</div>
            <div className="prop-val">
              <div className="rec-row">
                {RECUR.map(([k,label])=>(
                  <div key={k} className={"pill-btn"+(sel.recur===k?" on":"")}
                    onClick={()=>patch(sel.id,x=>({...x,recur:k}))}>{label}</div>
                ))}
              </div>
            </div>
          </div>

          {/* STEPS - editable list only (the horizontal progress rail lives on the card, per 3b) */}
          <div className="sec">
            <div className="sec-h">Steps <span className="cnt">{doneCount} of {sel.steps.length}</span></div>

            {sel.steps.map((s,idx)=>(
              <div
                className={"pstep"+(dragIdx===idx?" drag":"")+(overIdx===idx?" over":"")}
                key={idx}
                draggable
                onDragStart={()=>setDragIdx(idx)}
                onDragOver={e=>{e.preventDefault();setOverIdx(idx);}}
                onDragEnd={()=>{
                  if(dragIdx!==null&&overIdx!==null&&dragIdx!==overIdx){
                    patch(sel.id,x=>{const arr=[...x.steps];const [m]=arr.splice(dragIdx,1);arr.splice(overIdx,0,m);return {...x,steps:arr};});
                  }
                  setDragIdx(null);setOverIdx(null);
                }}
              >
                <div className="grip" title="Drag to reorder"><Ic n="grip" s={15}/></div>
                <div className={"pd"+(s.d?" on":"")} onClick={()=>patch(sel.id,x=>({...x,steps:x.steps.map((y,j)=>j===idx?{...y,d:!y.d}:y)}))}>
                  {s.d && <Ic n="check" s={10} c="#fff" sw={3}/>}
                </div>
                <div className={"pt"+(s.d?" on":"")} style={s.d?{fontWeight:600}:null}>{s.t}</div>
                <div className="pdel" onClick={()=>patch(sel.id,x=>({...x,steps:x.steps.filter((_,j)=>j!==idx)}))}><Ic n="trash" s={14}/></div>
              </div>
            ))}
            <div className="add-step">
              <input placeholder="Add a step..." value={draft} onChange={e=>setDraft(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&draft.trim()){patch(sel.id,x=>({...x,steps:[...x.steps,{t:draft.trim(),d:false}]}));setDraft("");}}}/>
              <button className="pill-btn" onClick={()=>{if(draft.trim()){patch(sel.id,x=>({...x,steps:[...x.steps,{t:draft.trim(),d:false}]}));setDraft("");}}}><Ic n="plus" s={14}/></button>
            </div>
          </div>

          {/* NOTES */}
          <div className="sec">
            <div className="sec-h"><span><Ic n="note" s={13}/> Notes</span></div>
            <textarea className="notes" defaultValue={sel.notes} placeholder="Add notes..."/>
          </div>

          {/* FILES */}
          <div className="sec">
            <div className="sec-h"><span><Ic n="paperclip" s={13}/> Files</span></div>
            {sel.files.map((f,idx)=>(
              <div className="file" key={idx}>
                <Ic n="file" s={15} c="#8a89a0"/>{f}
                <div className="fx"><Ic n="x" s={14}/></div>
              </div>
            ))}
            <div className="file-add"><Ic n="plus" s={13} style={{verticalAlign:"-2px"}}/> Attach a file</div>
          </div>
        </div>
      </div>
      )}
    </div>

    <div className="legend">
      <b>Detail panel — full vision (mockup).</b> Click any to-do on the left to open its panel. Everything is interactive.<br/>
      <span className="tag">A</span><b>Quick wins:</b> color bar/picker, star (move-to-top), due-date, revive-completed (click a completed item → Revive).<br/>
      <span className="tag">B</span><b>Medium:</b> notes.<br/>
      <span className="tag">C</span><b>Own slices:</b> recurring (recurrence engine), files (attachment storage for personal to-dos).<br/>
      The horizontal progress rail stays on the CARD (as shipped in 3b). The panel holds the editable step LIST only: drag the grip handle (appears on hover) to reorder, click a dot to toggle, trash to delete.
    </div>
  </div>
  );
}

function Card({i,sel,onOpen,onTick}){
  const dueLabel = i.done? null : (i.due==="2026-07-08"?["d3","Jul 8"]:i.due==="2026-07-24"?["tomorrow","Fri"]:i.due==="2026-07-25"?["d3","Sat"]:["d3",""]);
  const dc=i.steps.filter(s=>s.d).length;
  return (
    <div className={"card"+(sel?" sel":"")+(i.done?" is-done":"")} onClick={onOpen}>
      <div className="card-bar" style={{background:i.color}}/>
      <div className="card-top">
        <div className={"tick"+(i.done?" on":"")} onClick={e=>{e.stopPropagation();onTick();}}>
          {i.done && <Ic n="check" s={12} c="#fff" sw={3}/>}
        </div>
        <div className={"card-title"+(i.done?" done":"")}>{i.title}</div>
        {i.recur!=="none" && <span className="chip d3" title="Repeats"><Ic n="repeat" s={11} style={{verticalAlign:"-1px"}}/> {i.recur}</span>}
        {dueLabel && dueLabel[1] && <span className={"chip "+dueLabel[0]}>{dueLabel[1]}</span>}
        <div className={"star"+(i.star?" on":"")} onClick={e=>{e.stopPropagation();}}>
          <Ic n="star" s={16} c={i.star?"#f2b705":"#c3c2d0"} fill={i.star?"#f2b705":"none"}/>
        </div>
      </div>
      {i.steps.length>0 && !i.done && (
        <div className="rail-mini">
          <span className="rc">{dc} of {i.steps.length}</span>
          <div className="rt"><div className="rf" style={{width:(dc/i.steps.length*100)+"%"}}/></div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
